<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>FiveM Fight Club</title>
  </head>
  <body>
    <div id="app" class="app hidden" aria-hidden="true">
      <div class="panel">
        <header class="panel__head">
          <h1 class="panel__title">Fight Club</h1>
          <p class="panel__sub">Queue &amp; match status</p>
        </header>
        <main class="panel__body">
          <p id="status" class="status">Ready</p>
        </main>
        <footer class="panel__foot">
          <button type="button" id="close" class="btn">Close</button>
        </footer>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
